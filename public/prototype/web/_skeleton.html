<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2F6BFF;
      --color-primary-container:    #E8F0FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F6F8FB;
      --color-surface-container-lowest:   #EEF1F6;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EEF1F6;
      --color-surface-container-high:     #E6EAF2;
      --color-surface-container-highest:  #DDE3ED;
      /* === 文字 === */
      --color-on-surface:           #152033;
      --color-on-surface-variant:   #637089;
      /* === 功能色 === */
      --color-success:  #16A37B;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      /* === 边框 === */
      --color-outline:          #E6EAF2;
      --color-outline-variant:  #D1D5DB;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.16);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 h-14 flex items-center justify-between px-6 border-b border-outline/50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
        <i data-lucide="box" class="w-4 h-4 text-on-primary"></i>
      </div>
      <span class="font-semibold text-base">Ozon ERP</span>
    </div>
    <div class="flex items-center gap-4">
      <button class="flex items-center gap-2 text-sm text-on-surface-variant hover:text-on-surface transition-colors">
        <i data-lucide="bell" class="w-4 h-4"></i>
        <span class="bg-error text-white text-xs px-1.5 py-0.5 rounded-full font-medium">3</span>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-medium text-sm">初</div>
        <span class="text-sm font-medium">小初</span>
      </div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <aside class="w-56 shrink-0 bg-surface border-r border-outline/50 overflow-y-auto">
      <div class="p-3 space-y-0.5">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium text-sm" aria-current="page">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>仪表盘
        </a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="shopping-cart" class="w-4 h-4"></i>订单管理
        </a>
        <a href="purchase.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="package" class="w-4 h-4"></i>采购管理
        </a>
        <a href="quick-entry.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="clipboard-list" class="w-4 h-4"></i>快捷录单
        </a>
        <a href="logistics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="truck" class="w-4 h-4"></i>物流追踪
        </a>
        <a href="packaging.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="box" class="w-4 h-4"></i>打包流程
        </a>
        <a href="finance.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-colors">
          <i data-lucide="calculator" class="w-4 h-4"></i>财务核算
        </a>
      </div>
    </aside>

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- 页面内容由子 Agent 填充 -->
    </main>
    <!-- @main-content:end -->
  </div>
  <!-- @nav:end 导航组件 -->

  <script>lucide.createIcons();</script>
</body>

</html>
