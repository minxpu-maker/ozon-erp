<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Ozon ERP</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2F6BFF;
      --color-primary-container:    #E8F0FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F6F8FB;
      --color-surface-container-lowest:   #EEF1F6;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EEF1F6;
      --color-surface-container-high:     #E6EAF2;
      --color-surface-container-highest:  #DDE3ED;
      /* === 文字 === */
      --color-on-surface:           #152033;
      --color-on-surface-variant:   #637089;
      /* === 功能色 === */
      --color-success:  #16A37B;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      /* === 边框 === */
      --color-outline:          #E6EAF2;
      --color-outline-variant:  #D1D5DB;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.16);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center p-6">

  <!-- @main-content:start -->
  <main class="w-full max-w-5xl">
    <div class="bg-surface rounded-2xl shadow-card overflow-hidden">
      <div class="grid lg:grid-cols-2">
        
        <!-- 左侧品牌展示区域 -->
        <div class="bg-gradient-to-br from-primary to-primary/80 p-10 lg:p-12 flex flex-col justify-center">
          <!-- Logo和名称 -->
          <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
              <i data-lucide="box" class="w-7 h-7 text-white"></i>
            </div>
            <span class="text-2xl font-bold text-white">Ozon ERP</span>
          </div>
          
          <!-- 品牌标语 -->
          <p class="text-white/90 text-lg mb-10">跨境电商智能供应链管理系统</p>
          
          <!-- 系统特性列表 -->
          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="download-cloud" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-white/90 text-sm">订单自动抓取</span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-white/90 text-sm">智能采购匹配</span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="map-pin" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-white/90 text-sm">物流追踪管理</span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="calculator" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-white/90 text-sm">财务精准核算</span>
            </div>
          </div>
          
          <!-- 底部装饰 -->
          <div class="mt-12 pt-8 border-t border-white/20">
            <p class="text-white/60 text-xs">© 2024 Ozon ERP. All rights reserved.</p>
          </div>
        </div>
        
        <!-- 右侧登录表单区域 -->
        <div class="p-10 lg:p-12 flex flex-col justify-center">
          <h1 class="text-2xl font-bold text-on-surface mb-8">欢迎登录</h1>
          
          <form id="login-form" class="space-y-5">
            <!-- 手机号输入框 -->
            <div class="space-y-1.5">
              <label for="phone-input" class="text-sm font-medium text-on-surface">手机号</label>
              <div class="relative flex items-center">
                <span class="absolute left-3 text-sm text-on-surface-variant font-medium">+86</span>
                <input 
                  type="tel" 
                  id="phone-input" 
                  placeholder="请输入手机号" 
                  maxlength="11"
                  class="w-full bg-surface-container border-none rounded-lg pl-14 pr-10 py-3 text-sm
                         text-on-surface placeholder:text-on-surface-variant/50
                         focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all"
                />
                <button 
                  type="button" 
                  id="phone-clear-btn"
                  class="absolute right-3 text-on-surface-variant/50 hover:text-on-surface-variant transition-colors hidden"
                >
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <p id="phone-error" class="text-xs text-error hidden">请输入正确的11位手机号</p>
            </div>
            
            <!-- 验证码输入框 -->
            <div class="space-y-1.5">
              <label for="code-input" class="text-sm font-medium text-on-surface">验证码</label>
              <div class="flex gap-3">
                <input 
                  type="text" 
                  id="code-input" 
                  placeholder="请输入验证码" 
                  maxlength="6"
                  class="flex-1 bg-surface-container border-none rounded-lg px-3 py-3 text-sm
                         text-on-surface placeholder:text-on-surface-variant/50
                         focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all"
                />
                <button 
                  type="button" 
                  id="get-code-btn"
                  disabled
                  class="px-4 py-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap
                         bg-surface-container-high text-on-surface-variant cursor-not-allowed"
                >
                  获取验证码
                </button>
              </div>
            </div>
            
            <!-- 登录按钮 -->
            <button 
              type="submit" 
              id="login-btn"
              disabled
              class="w-full bg-primary text-on-primary py-3 rounded-lg text-sm font-medium
                     hover:opacity-90 active:scale-[0.98] transition-all
                     disabled:bg-surface-container-high disabled:text-on-surface-variant disabled:cursor-not-allowed disabled:hover:opacity-100 disabled:active:scale-100"
            >
              登录
            </button>
          </form>
          
          <!-- 底部提示 -->
          <p class="text-center text-xs text-on-surface-variant mt-8">
            登录即表示同意
            <a href="#" data-element="nav-#" class="text-primary hover:underline">《用户协议》</a>
            和
            <a href="#" data-element="nav-#-2" class="text-primary hover:underline">《隐私政策》</a>
          </p>
        </div>
        
      </div>
    </div>
  </main>
  <!-- @main-content:end -->

  <script>
    lucide.createIcons();
    
    $(function() {
      const $phoneInput = $('#phone-input');
      const $phoneClearBtn = $('#phone-clear-btn');
      const $phoneError = $('#phone-error');
      const $codeInput = $('#code-input');
      const $getCodeBtn = $('#get-code-btn');
      const $loginBtn = $('#login-btn');
      const $loginForm = $('#login-form');
      
      let countdownTimer = null;
      let countdown = 0;
      
      // 手机号格式验证（11位数字）
      function isValidPhone(phone) {
        return /^1\d{10}$/.test(phone);
      }
      
      // 更新按钮状态
      function updateButtonStates() {
        const phone = $phoneInput.val().trim();
        const code = $codeInput.val().trim();
        
        // 获取验证码按钮状态
        if (countdown > 0) {
          // 倒计时中，保持禁用状态
        } else if (phone.length > 0 && isValidPhone(phone)) {
          $getCodeBtn
            .prop('disabled', false)
            .removeClass('bg-surface-container-high text-on-surface-variant cursor-not-allowed')
            .addClass('bg-primary-container text-primary hover:bg-primary/20 cursor-pointer');
        } else {
          $getCodeBtn
            .prop('disabled', true)
            .removeClass('bg-primary-container text-primary hover:bg-primary/20 cursor-pointer')
            .addClass('bg-surface-container-high text-on-surface-variant cursor-not-allowed');
        }
        
        // 登录按钮状态
        if (phone.length > 0 && isValidPhone(phone) && code.length >= 4) {
          $loginBtn.prop('disabled', false);
        } else {
          $loginBtn.prop('disabled', true);
        }
      }
      
      // 手机号输入事件
      $phoneInput.on('input', function() {
        const value = $(this).val().trim();
        
        // 显示/隐藏清除按钮
        if (value.length > 0) {
          $phoneClearBtn.removeClass('hidden');
        } else {
          $phoneClearBtn.addClass('hidden');
        }
        
        // 验证手机号格式
        if (value.length === 11 && !isValidPhone(value)) {
          $phoneError.removeClass('hidden');
        } else {
          $phoneError.addClass('hidden');
        }
        
        updateButtonStates();
      });
      
      // 清除手机号
      $phoneClearBtn.on('click', function() {
        $phoneInput.val('').focus();
        $phoneClearBtn.addClass('hidden');
        $phoneError.addClass('hidden');
        updateButtonStates();
      });
      
      // 验证码输入事件
      $codeInput.on('input', function() {
        updateButtonStates();
      });
      
      // 获取验证码
      $getCodeBtn.on('click', function() {
        if ($(this).prop('disabled')) return;
        
        // 开始60秒倒计时
        countdown = 60;
        $getCodeBtn.prop('disabled', true);
        
        function updateCountdown() {
          if (countdown > 0) {
            $getCodeBtn.text(countdown + '秒后重试');
            countdown--;
            countdownTimer = setTimeout(updateCountdown, 1000);
          } else {
            $getCodeBtn.text('获取验证码');
            updateButtonStates();
          }
        }
        
        updateCountdown();
        
        // 实际项目中这里应该调用API发送验证码
        console.log('发送验证码到手机:', $phoneInput.val().trim());
      });
      
      // 登录表单提交
      $loginForm.on('submit', function(e) {
        e.preventDefault();
        
        if ($loginBtn.prop('disabled')) return;
        
        // 登录成功，跳转到仪表盘
        // 实际项目中这里应该调用API验证登录
        window.location.href = 'dashboard.html';
      });
    });
  </script>
</body>

</html>
